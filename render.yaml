services:
  - type: web
    name: llm-exception-analyzer
    env: node
    plan: free
    buildCommand: |
      npm install
      cd frontend && npm install && npm run build
      cd ../backend && npm install && npm run build
    startCommand: export DATABASE_URL=mysql://avnadmin:MYSQL_ROOT_PASSWORD@mysql-242268f-ndavat-051c.a.aivencloud.com:18638/defaultdb?ssl-mode=REQUIRED && cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: MYSQL_ROOT_PASSWORD
        fromService:
          type: pserv
          name: exception-db
          envVarKey: MYSQL_ROOT_PASSWORD
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: openai/gpt-4o-mini
      - key: OPENROUTER_BASE_URL
        value: https://openrouter.ai/api/v1

  - type: pserv
    name: defaultdb
    env: image
    plan: starter
    image: mysql:8.0
    envVars:
      - key: MYSQL_DATABASE
        value: defaultdb
      - key: MYSQL_ROOT_PASSWORD
        generateValue: true
